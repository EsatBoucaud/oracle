  <text x="118" y="358" fill="#D7F3E0" font-family="Arial, Helvetica, sans-serif" font-size="30">Official partner pages and Mississippi milestone data drive the portal examples</text>

  <rect x="118" y="448" width="470" height="244" rx="30" fill="#103224" stroke="#2C7950"/>
