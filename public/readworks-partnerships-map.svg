  <text x="154" y="586" fill="white" font-family="Georgia, 'Times New Roman', serif" font-size="72">Nationwide</text>
  <text x="154" y="642" fill="#D7F3E0" font-family="Arial, Helvetica, sans-serif" font-size="26">ReadWorks states its materials are used across every U.S. state.</text>

  <rect x="626" y="448" width="382" height="244" rx="30" fill="#0C2734" stroke="#1E5B72"/>
