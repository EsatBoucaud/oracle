  <text x="118" y="352" fill="#D7EEF5" font-family="Arial, Helvetica, sans-serif" font-size="30">Official January 2026 recap of the Fall 2025 ReadWorks survey</text>

  <rect x="118" y="432" width="420" height="244" rx="30" fill="#0B2D39" stroke="#1A5D74"/>
  <text x="154" y="500" fill="#A4E7F6" font-family="Arial, Helvetica, sans-serif" font-size="24">Participants</text>
