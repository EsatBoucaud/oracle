<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#07121A"/>
  <rect x="72" y="72" width="1456" height="756" rx="36" fill="url(#bg)" stroke="rgba(255,255,255,0.12)"/>
